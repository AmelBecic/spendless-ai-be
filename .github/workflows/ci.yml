name: CI
on:
  pull_request:
  push:
    branches: [main]

# A new push supersedes the run still going for the same ref — except on main,
# where every commit's result is a record worth keeping.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  gates:
    runs-on: ubuntu-latest

    # Disposable Postgres for the integration tests (never the real DB).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: spendless_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # The disposable Postgres service. DATABASE_URL/DIRECT_URL point here too so
      # the app's Prisma singleton connects to the test DB during integration tests.
      TEST_DATABASE_URL: postgresql://test:test@localhost:5432/spendless_test
      DATABASE_URL: postgresql://test:test@localhost:5432/spendless_test
      DIRECT_URL: postgresql://test:test@localhost:5432/spendless_test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # gitleaks needs full history

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Apply migrations to the test database
        run: npx prisma migrate deploy

      # No `--if-present`: these three scripts all exist, and if one is ever
      # renamed away the gate must fail loudly rather than silently pass.
      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Dependency audit
        run: npm audit --audit-level=high || true
